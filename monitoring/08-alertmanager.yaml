apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 1m

    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 5s
      group_interval: 30s
      repeat_interval: 30m
      receiver: 'demo-receiver'
      routes:
        - matchers:
            - severity = critical
          receiver: 'demo-receiver'
          group_wait: 5s
        - matchers:
            - severity = warning
          receiver: 'demo-receiver'

    receivers:
      - name: 'demo-receiver'
        # ── Para producción, descomentar y configurar Slack ─────────────────
        # slack_configs:
        #   - api_url: 'https://hooks.slack.com/services/T.../B.../...'
        #     channel: '#alertas-k8s'
        #     send_resolved: true
        #     title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        #     text: |
        #       {{ range .Alerts }}
        #       *Alerta:* {{ .Annotations.summary }}
        #       *Detalle:* {{ .Annotations.description }}
        #       *Severidad:* {{ .Labels.severity }}
        #       {{ end }}
        #
        # ── O email ─────────────────────────────────────────────────────────
        # email_configs:
        #   - to: 'equipo@empresa.com'
        #     from: 'alertmanager@empresa.com'
        #     smarthost: 'smtp.gmail.com:587'
        #     auth_username: 'alertmanager@empresa.com'
        #     auth_password: 'password'

    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: ['alertname', 'namespace']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      securityContext:
        runAsUser: 65534
        runAsNonRoot: true
        fsGroup: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --web.external-url=http://192.168.109.142:30903
          ports:
            - containerPort: 9093
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  type: NodePort
  ports:
    - name: http
      port: 9093
      targetPort: 9093
      nodePort: 30903
  selector:
    app: alertmanager
