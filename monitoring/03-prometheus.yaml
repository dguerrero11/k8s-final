apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager.monitoring.svc:9093']

    rule_files:
      - /etc/prometheus/rules.yml

    scrape_configs:

      # ── Prometheus mismo ──────────────────────────────────────────────────
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # ── Node Exporter (métricas de SO de cada nodo) ───────────────────────
      - job_name: 'node-exporter'
        static_configs:
          - targets:
              - '192.168.109.142:9100'   # master01
              - '192.168.109.143:9100'   # worker01
              - '192.168.109.144:9100'   # worker02
              - '192.168.109.145:9100'   # worker03

      # ── Kube State Metrics ────────────────────────────────────────────────
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.monitoring.svc:8080']

      # ── cAdvisor (uso de CPU/RAM por contenedor) ──────────────────────────
      - job_name: 'kubernetes-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            regex: (.+)
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

      # ── Tekton Pipelines ──────────────────────────────────────────────────
      - job_name: 'tekton'
        static_configs:
          - targets:
              - 'tekton-pipelines-controller.tekton-pipelines.svc:9090'
              - 'tekton-pipelines-webhook.tekton-pipelines.svc:9090'

      # ── ArgoCD ────────────────────────────────────────────────────────────
      - job_name: 'argocd'
        static_configs:
          - targets:
              - 'argocd-metrics.argocd.svc:8082'
              - 'argocd-server-metrics.argocd.svc:8083'
              - 'argocd-repo-server.argocd.svc:8084'
              - 'argocd-notifications-controller-metrics.argocd.svc:9001'

      # ── AlertManager ─────────────────────────────────────────────────────
      - job_name: 'alertmanager'
        static_configs:
          - targets: ['alertmanager.monitoring.svc:9093']

      # ── Pods con anotación prometheus.io/scrape: "true" ──────────────────
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
  rules.yml: |
    groups:

      # ── Tekton CI/CD ────────────────────────────────────────────────────────
      - name: tekton-alerts
        rules:
          - alert: TektonPipelineFailed
            expr: tekton_pipelines_controller_pipelinerun_total{status="failed"} > 0
            for: 0m
            labels:
              severity: warning
              team: cicd
            annotations:
              summary: "Pipeline de Tekton falló"
              description: "El pipeline '{{ $labels.pipeline }}' tiene {{ $value }} run(s) fallidos en namespace {{ $labels.namespace }}"

          - alert: TektonPipelineSlowBuild
            expr: |
              histogram_quantile(0.99,
                rate(tekton_pipelines_controller_pipelinerun_duration_seconds_bucket[10m])
              ) > 120
            for: 1m
            labels:
              severity: warning
              team: cicd
            annotations:
              summary: "Pipeline de Tekton tarda más de 2 minutos (p99)"
              description: "El p99 de duración es {{ $value | humanizeDuration }}"

      # ── ArgoCD GitOps ───────────────────────────────────────────────────────
      - name: argocd-alerts
        rules:
          - alert: ArgoAppOutOfSync
            expr: argocd_app_info{sync_status="OutOfSync"} == 1
            for: 0m
            labels:
              severity: warning
              team: gitops
            annotations:
              summary: "App ArgoCD desincronizada"
              description: "La app '{{ $labels.name }}' está OutOfSync → destino {{ $labels.dest_namespace }}"

          - alert: ArgoAppDegraded
            expr: argocd_app_info{health_status="Degraded"} == 1
            for: 1m
            labels:
              severity: critical
              team: gitops
            annotations:
              summary: "App ArgoCD degradada"
              description: "La app '{{ $labels.name }}' tiene estado de salud Degraded"

      # ── Kubernetes General ──────────────────────────────────────────────────
      - name: kubernetes-alerts
        rules:
          - alert: DeploymentUnavailable
            expr: |
              kube_deployment_status_replicas_available
                < kube_deployment_spec_replicas
            for: 1m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Deployment sin réplicas suficientes"
              description: "{{ $labels.namespace }}/{{ $labels.deployment }}: solo {{ $value }} réplicas disponibles"

          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
            for: 0m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Pod en CrashLoopBackOff"
              description: "{{ $labels.namespace }}/{{ $labels.pod }} reiniciado {{ $value | humanize }} veces en 15 minutos"

          - alert: PodNotRunning
            expr: |
              kube_pod_status_phase{phase=~"Failed|Unknown", namespace!="kube-system"} == 1
            for: 2m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "Pod en estado anormal"
              description: "{{ $labels.namespace }}/{{ $labels.pod }} está en fase {{ $labels.phase }}"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: nfs-csi
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsUser: 65534
        runAsNonRoot: true
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.47.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
            - --storage.tsdb.no-lockfile
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30900
  selector:
    app: prometheus
